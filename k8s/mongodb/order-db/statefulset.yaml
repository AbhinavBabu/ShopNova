# =============================================================================
# order-db — Headless Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: order-db-headless
  namespace: ecommerce-dev
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: order-db
spec:
  clusterIP: None
  selector:
    app: order-db
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
      name: mongo
---
# =============================================================================
# order-db — ClusterIP Service
# DNS: order-db.ecommerce-dev.svc.cluster.local:27017
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: ecommerce-dev
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: order-db
spec:
  type: ClusterIP
  selector:
    app: order-db
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
      name: mongo
---
# =============================================================================
# order-db — StatefulSet
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: order-db
  namespace: ecommerce-dev
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: order-db
spec:
  serviceName: order-db-headless
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
        app.kubernetes.io/name: shopnova
        app.kubernetes.io/component: order-db
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
      containers:
        - name: mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              name: mongo
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: order-db-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - mongosh
                - "--eval"
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: order-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
