# =============================================================================
# ShopNova Secrets — ecommerce-dev namespace
#
# SECURITY NOTE: This file contains PLACEHOLDER base64-encoded values only.
# DO NOT commit real secrets to version control.
#
# To generate base64 values:
#   echo -n "your-actual-value" | base64
#
# For production, use one of:
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   - External Secrets Operator (https://external-secrets.io)
#   - HashiCorp Vault Agent Injector
#
# To create secret imperatively (preferred for local dev):
#   kubectl create secret generic shopnova-secrets \
#     --from-literal=JWT_SECRET="your-jwt-secret-min-32-chars" \
#     --from-literal=EMAIL_USER="your@gmail.com" \
#     --from-literal=EMAIL_PASS="your-gmail-app-password" \
#     --namespace=ecommerce-dev
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: shopnova-secrets
  namespace: ecommerce-dev
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # REPLACE: echo -n "your-super-secret-jwt-key-min-32-chars" | base64
  JWT_SECRET: eW91ci1zdXBlci1zZWNyZXQtand0LWtleS1taW4tMzItY2hhcnM=
  # REPLACE: echo -n "your@gmail.com" | base64
  EMAIL_USER: eW91ckBnbWFpbC5jb20=
  # REPLACE: echo -n "your-gmail-app-password" | base64
  EMAIL_PASS: eW91ci1nbWFpbC1hcHAtcGFzc3dvcmQ=
---
# =============================================================================
# ShopNova Secrets — ecommerce-prod namespace
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: shopnova-secrets
  namespace: ecommerce-prod
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # REPLACE with production values before applying
  JWT_SECRET: eW91ci1zdXBlci1zZWNyZXQtand0LWtleS1taW4tMzItY2hhcnM=
  EMAIL_USER: eW91ckBnbWFpbC5jb20=
  EMAIL_PASS: eW91ci1nbWFpbC1hcHAtcGFzc3dvcmQ=
