# =============================================================================
# notification-service — Deployment + Service
# Uses EMAIL_USER and EMAIL_PASS secrets for Gmail SMTP
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ecommerce-dev
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: notification-service
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
        app.kubernetes.io/name: shopnova
        app.kubernetes.io/component: notification-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: notification-service
          image: shopnova/notification-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "8004"
          envFrom:
            - secretRef:
                name: shopnova-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ecommerce-dev
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - port: 8004
      targetPort: 8004
      protocol: TCP
      name: http
