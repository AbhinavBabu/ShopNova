# =============================================================================
# auth-service — Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce-dev
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: auth-service
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/name: shopnova
        app.kubernetes.io/component: auth-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: auth-service
          image: shopnova/auth-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "8001"
          envFrom:
            - configMapRef:
                name: shopnova-config
            - secretRef:
                name: shopnova-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
# =============================================================================
# auth-service — ClusterIP Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ecommerce-dev
  labels:
    app.kubernetes.io/name: shopnova
    app.kubernetes.io/component: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
