version: "3.9"

networks:
  ecommerce-net:
    driver: bridge

volumes:
  auth-db-data:
  product-db-data:
  order-db-data:

services:

  auth-db:
    image: mongo:7
    container_name: auth-db
    restart: unless-stopped
    volumes:
      - auth-db-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: mongo:7
    container_name: product-db
    restart: unless-stopped
    volumes:
      - product-db-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: mongo:7
    container_name: order-db
    restart: unless-stopped
    volumes:
      - order-db-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      AUTH_MONGO_URI: ${AUTH_MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - ecommerce-net

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      PRODUCT_MONGO_URI: ${PRODUCT_MONGO_URI}
      NODE_ENV: production
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      ORDER_MONGO_URI: ${ORDER_MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: 8004
      NODE_ENV: production
    depends_on:
      order-db:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - ecommerce-net

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    networks:
      - ecommerce-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Vite bakes env vars into the static bundle at build time,
      # so they must be passed as build args rather than runtime env vars.
      args:
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL}
        VITE_PRODUCT_SERVICE_URL: ${VITE_PRODUCT_SERVICE_URL}
        VITE_ORDER_SERVICE_URL: ${VITE_ORDER_SERVICE_URL}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - ecommerce-net
