version: "3.9"

networks:
  ecommerce-net:
    driver: bridge

volumes:
  auth-db-data:
  product-db-data:
  order-db-data:

services:

  # ─────────────────────────────────────────
  # auth-db  — dedicated MongoDB for auth-service
  # ─────────────────────────────────────────
  auth-db:
    image: mongo:7
    container_name: auth-db
    restart: unless-stopped
    volumes:
      - auth-db-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # product-db  — dedicated MongoDB for product-service
  # ─────────────────────────────────────────
  product-db:
    image: mongo:7
    container_name: product-db
    restart: unless-stopped
    volumes:
      - product-db-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # order-db  — dedicated MongoDB for order-service
  # ─────────────────────────────────────────
  order-db:
    image: mongo:7
    container_name: order-db
    restart: unless-stopped
    volumes:
      - order-db-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Auth Service  (port 8001)
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      AUTH_MONGO_URI: mongodb://auth-db:27017/authdb
      JWT_SECRET: supersecretjwtkey_change_in_production
      NODE_ENV: development
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Product Service  (port 8002)
  # ─────────────────────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      PRODUCT_MONGO_URI: mongodb://product-db:27017/productdb
      NODE_ENV: development
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Order Service  (port 8003)
  # ─────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      ORDER_MONGO_URI: mongodb://order-db:27017/orderdb
      JWT_SECRET: supersecretjwtkey_change_in_production
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: 8004
      NODE_ENV: development
    depends_on:
      order-db:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Notification Service  (port 8004)
  # ─────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Frontend  (Nginx on port 3000)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_AUTH_SERVICE_URL: http://localhost:8001
      VITE_PRODUCT_SERVICE_URL: http://localhost:8002
      VITE_ORDER_SERVICE_URL: http://localhost:8003
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - ecommerce-net
