version: "3.9"

networks:
  ecommerce-net:
    driver: bridge

volumes:
  mongo-data:

services:
  # ─────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Auth Service  (port 8001)
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      MONGO_URI: mongodb://root:rootpassword@mongodb:27017/authdb?authSource=admin
      JWT_SECRET: supersecretjwtkey_change_in_production
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Product Service  (port 8002)
  # ─────────────────────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      MONGO_URI: mongodb://root:rootpassword@mongodb:27017/productdb?authSource=admin
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Order Service  (port 8003)
  # ─────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      MONGO_URI: mongodb://root:rootpassword@mongodb:27017/orderdb?authSource=admin
      JWT_SECRET: supersecretjwtkey_change_in_production
      NOTIFICATION_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: 8004
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Notification Service  (port 8004)
  # ─────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Frontend  (Vite dev server on port 3000)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_AUTH_SERVICE_URL: http://localhost:8001
      VITE_PRODUCT_SERVICE_URL: http://localhost:8002
      VITE_ORDER_SERVICE_URL: http://localhost:8003
    depends_on:
      - auth-service
      - product-service
      - order-service
    networks:
      - ecommerce-net
