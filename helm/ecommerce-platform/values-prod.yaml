# =============================================================================
# values-prod.yaml — Production Environment Overrides
# Usage: helm install shopnova-prod ./helm/ecommerce-platform \
#          -f helm/ecommerce-platform/values-prod.yaml \
#          --namespace ecommerce-prod --create-namespace
#
# IMPORTANT: Override secrets before deploying to production:
#   helm install shopnova-prod ./helm/ecommerce-platform \
#     -f helm/ecommerce-platform/values-prod.yaml \
#     --set secrets.jwtSecret="<base64>" \
#     --set secrets.emailUser="<base64>" \
#     --set secrets.emailPass="<base64>" \
#     --namespace ecommerce-prod --create-namespace
# =============================================================================

global:
  environment: "prod"
  # Update storageClass for your cloud provider:
  # GKE: pd-standard | EKS: gp2 | AKS: default
  storageClass: "standard"
  imagePullPolicy: Always  # Always pull in prod to get latest digest

# HA replica counts for production
frontend:
  replicaCount: 3
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

authService:
  replicaCount: 3
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 384Mi

productService:
  replicaCount: 3
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 384Mi

orderService:
  replicaCount: 3
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 384Mi

notificationService:
  replicaCount: 2
  image:
    tag: "1.0.0"

# Larger PVC sizes for production data
mongodb:
  storage:
    authDb:
      size: "10Gi"
    productDb:
      size: "20Gi"
    orderDb:
      size: "10Gi"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# HPAs enabled with higher ceilings in prod
hpa:
  frontend:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 75
  authService:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
