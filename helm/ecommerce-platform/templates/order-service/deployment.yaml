apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/component: order-service
spec:
  replicas: {{ .Values.orderService.replicaCount }}
  selector:
    matchLabels:
      {{- include "ecommerce.selectorLabels" (dict "component" "order-service") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "ecommerce.selectorLabels" (dict "component" "order-service") | nindent 8 }}
        {{- include "ecommerce.labels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- include "ecommerce.podSecurityContext.node" . | nindent 8 }}
      containers:
        - name: order-service
          image: {{ include "ecommerce.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.orderService.image.repository "tag" .Values.orderService.image.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.orderService.service.port }}
              name: http
          securityContext:
            {{- include "ecommerce.containerSecurityContext" . | nindent 12 }}
            readOnlyRootFilesystem: true
          env:
            - name: PORT
              value: {{ .Values.orderService.service.port | quote }}
          envFrom:
            - configMapRef:
                name: shopnova-config
            - secretRef:
                name: shopnova-secrets
          resources:
            {{- toYaml .Values.orderService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.orderService.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.orderService.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
    app.kubernetes.io/component: order-service
spec:
  type: {{ .Values.orderService.service.type }}
  selector:
    {{- include "ecommerce.selectorLabels" (dict "component" "order-service") | nindent 4 }}
  ports:
    - port: {{ .Values.orderService.service.port }}
      targetPort: {{ .Values.orderService.service.port }}
      protocol: TCP
      name: http
