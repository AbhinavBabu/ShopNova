server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Reverse-proxy: Auth Service ─────────────────────────────────────
    # Requests to /api/auth/* are forwarded to the auth-service container.
    # The upstream hostname is injected at container startup via envsubst,
    # so the image never needs to be rebuilt when service addresses change.
    location /api/auth/ {
        proxy_pass         http://${AUTH_SERVICE_HOST}:${AUTH_SERVICE_PORT}/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Reverse-proxy: Product Service ──────────────────────────────────
    location /api/products/ {
        proxy_pass         http://${PRODUCT_SERVICE_HOST}:${PRODUCT_SERVICE_PORT}/api/products/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Reverse-proxy: Order Service ────────────────────────────────────
    location /api/orders/ {
        proxy_pass         http://${ORDER_SERVICE_HOST}:${ORDER_SERVICE_PORT}/api/orders/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback (React Router) ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
